    <script>
  const item = document.getElementById("item");
  const qty = document.getElementById("qty");
  const priceField = document.getElementById("price");
  const totalField = document.getElementById("total");

  function calculateTotal() {
    let price = item.value;
    let quantity = qty.value;

    if (!price || quantity <=0) {
      priceField.value = "";
      totalField.value = "";
      return;
    }
      
       priceField.value = "₹ " + price;
       totalField.value = "₹ " + (price * quantity);
    
     }
  

  item.addEventListener("change", calculateTotal);
  qty.addEventListener("input", calculateTotal);
  
function orderNow(){
  let name = document.querySelector('input[type="text"]').value.trim();
  let phone = document.querySelector('input[type="tel"]').value.trim();
  let selectedItem = item.value;
  let quantity = qty.value;

  if(name === "" || phone === "" || selectedItem === "" || quantity === "") {
    alert(" ⚠️ Please fill all details first!"); 
    return;
  }

    if(!/^[6-9]\d{9}$/.test(phone)) {
    alert("Please enter a valid 10-digit phone number!");
    return;
  }
   
  if(quantity <= 0) {
    alert("Quantity must be at least 1!");
    return;
  }
  alert("Order placed successfully ☕🔥");

  window.location.href = "../project2/LOC.html";
}
</script>
